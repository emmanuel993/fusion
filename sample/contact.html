<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Fashion Fusion</title>
  <link rel="stylesheet" href="sample.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="nav">
    <div class="logo"><img src="WhatsApp Image 2026-04-05 at 5.44.59 AM.jpeg" alt=""></div>

    <ul class="nav-links">
      <li><a href="sample.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <!-- RIGHT SIDE -->
   <div class="nav-icons">
  <span class="icon" onclick="openCart()">🛒</span>
  </div>
>
  </div>
</header>

<!-- OVERLAY -->
<div class="overlay" onclick="closeCart()"></div>

<!-- CART DRAWER -->
<div class="cart-drawer">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <span class="close-btn" onclick="closeCart()">✕</span>
  </div>

 
  <div class="cart-items"></div>

<div class="cart-footer">
  <h3>Total: $<span id="total">0</span></h3>
</div>

  <button class="checkout-btn">Checkout</button>
</div>


<!-- CONTACT SECTION -->
<section class="contact fade-in">
  <div class="contact-container">

    <h1>Contact Us</h1>
    <p class="contact-sub">Reach out. Stay connected.</p>

    <!-- SOCIAL LINKS -->
    <div class="contact-links">

      <a href="https://instagram.com/yourusername" target="_blank">
        Instagram
      </a>

      <a href="https://tiktok.com/@yourusername" target="_blank">
        TikTok
      </a>

      <a href="https://wa.me/234XXXXXXXXXX" target="_blank">
        WhatsApp
      </a>

      <a href="mailto:youremail@gmail.com">
        Email
      </a>

      <a href="tel:+234XXXXXXXXXX">
        Call Us
      </a>

    </div>

  </div>
</section>

<script src="sample.js"></script>
</body>
</html>
